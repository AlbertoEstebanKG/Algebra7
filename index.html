<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алгебра 7 — Тренажёр</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0f0f;
  --paper: #fafaf8;
  --card: #ffffff;
  --rule: #e8e6e0;
  --muted: #7a786f;
  --accent: #1a56c4;
  --accent-bg: #eef3fc;
  --green: #138a4a;
  --green-bg: #edf7f1;
  --red: #c41a1a;
  --red-bg: #fdf0f0;
  --amber: #a05c00;
  --amber-bg: #fff7e6;
  --tag-int: #1a4fa0;
  --tag-int-bg: #e8eef9;
  --tag-rat: #7c1fa0;
  --tag-rat-bg: #f5eafa;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --r: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.6; }

/* HEADER */
.topbar {
  background: var(--ink); color: #fff;
  padding: 0 2rem;
  position: sticky; top: 0; z-index: 200;
}
.topbar-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; gap: 1rem;
}
.site-name { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: #fff; }
.site-sub { font-size: 11px; color: #888; margin-top: 1px; }
.top-score {
  font-family: var(--mono); font-size: 12px;
  color: #aaa; display: flex; align-items: center; gap: 16px;
}
.top-score span { color: #fff; font-weight: 600; }

/* PROGRESS */
.pbar-wrap { height: 2px; background: #2a2a2a; }
.pbar-fill { height: 2px; background: var(--accent); transition: width 0.4s; }

/* NAV */
.nav-wrap {
  background: var(--card); border-bottom: 1px solid var(--rule);
  overflow-x: auto; white-space: nowrap;
  scrollbar-width: none;
}
.nav-wrap::-webkit-scrollbar { display: none; }
.nav-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 0; padding: 0 1.5rem; }
.nav-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  color: var(--muted); background: none; border: none;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--ink); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-btn.done-nav { color: var(--green); }

/* MAIN */
main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

/* SECTION HEADER */
.section-head { margin-bottom: 1.5rem; }
.section-num { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.section-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.section-desc { font-size: 13px; color: var(--muted); }

/* MODE TOGGLE */
.mode-toggle {
  display: inline-flex; border: 1px solid var(--rule);
  border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem;
}
.mode-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 7px 16px; border: none; background: var(--card);
  cursor: pointer; color: var(--muted); transition: background 0.15s, color 0.15s;
}
.mode-btn.active { background: var(--ink); color: #fff; }

/* TASKS GRID */
.tasks-grid { display: flex; flex-direction: column; gap: 12px; }

/* TASK CARD */
.task-card {
  background: var(--card); border: 1px solid var(--rule);
  border-radius: var(--r); padding: 1rem 1.25rem;
  transition: border-color 0.15s;
}
.task-card.correct { border-color: var(--green); }
.task-card.wrong { border-color: var(--red); }

.task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.task-num {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 1px;
}
.task-type {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 4px; flex-shrink: 0; text-transform: uppercase;
}
.type-int { background: var(--tag-int-bg); color: var(--tag-int); }
.type-rat { background: var(--tag-rat-bg); color: var(--tag-rat); }

.task-q {
  font-size: 15px; line-height: 1.7; flex: 1;
}
.task-q code {
  font-family: var(--mono); font-size: 14px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 4px; padding: 1px 6px;
}

.task-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }

.task-input {
  font-family: var(--mono); font-size: 14px;
  width: 160px; padding: 7px 10px;
  border: 1.5px solid var(--rule); border-radius: 7px;
  background: var(--paper); color: var(--ink);
  outline: none; transition: border-color 0.15s;
}
.task-input:focus { border-color: var(--accent); background: #fff; }
.task-input.ok { border-color: var(--green); background: var(--green-bg); }
.task-input.err { border-color: var(--red); background: var(--red-bg); }
.task-input:disabled { opacity: 0.65; cursor: not-allowed; }

.btn-check {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 7px 16px; border-radius: 7px;
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-check:hover { opacity: 0.88; }
.btn-check:disabled { background: var(--rule); color: var(--muted); cursor: not-allowed; opacity: 1; }

.attempts-badge {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); padding: 3px 8px;
  border: 1px solid var(--rule); border-radius: 4px;
  display: none;
}

.task-fb { font-size: 12px; font-weight: 500; margin-top: 7px; display: none; }
.task-fb.ok { display: block; color: var(--green); }
.task-fb.err { display: block; color: var(--red); }

.task-explain {
  margin-top: 8px; font-size: 13px; line-height: 1.65;
  background: var(--amber-bg); border: 1px solid #f0d090;
  border-radius: 7px; padding: 8px 12px; color: var(--amber);
  display: none;
}
.task-explain.show { display: block; }
.task-explain code { font-family: var(--mono); font-size: 12px; }

/* SECTION FOOTER */
.section-footer {
  margin-top: 1.5rem; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.score-line { font-size: 13px; color: var(--muted); }
.score-line b { color: var(--ink); }
.btn-next {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 9px 22px; border-radius: 8px; border: none;
  background: var(--green); color: #fff; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-next:hover { opacity: 0.88; }
.btn-next:disabled { background: var(--rule); color: var(--muted); cursor: not-allowed; opacity: 1; }

/* SECTION VIEWS */
.section-view { display: none; }
.section-view.active { display: block; }

/* DONE SCREEN */
.done-screen { text-align: center; padding: 3rem 1rem; }
.done-screen h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.done-screen p { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
.done-screen .final-score {
  font-family: var(--mono); font-size: 36px; font-weight: 600;
  color: var(--accent); margin: 1rem 0;
}

/* Divider between int/rat groups */
.group-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin: 1.25rem 0 0.75rem;
  display: flex; align-items: center; gap: 10px;
}
.group-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

/* THEORY BLOCK */
.theory-block {
  background: #f0f4ff;
  border: 1px solid #c8d8f8;
  border-radius: var(--r);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.75rem;
  position: relative;
}
.theory-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; gap: 12px;
}
.theory-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent);
  display: flex; align-items: center; gap: 7px;
}
.theory-label::before {
  content: '💡'; font-size: 14px; letter-spacing: 0;
}
.theory-chevron {
  font-size: 11px; color: var(--accent); transition: transform 0.2s;
  flex-shrink: 0;
}
.theory-chevron.open { transform: rotate(180deg); }
.theory-title {
  font-size: 16px; font-weight: 600; color: var(--ink);
  margin: 10px 0 12px;
}
.theory-body {
  font-size: 14px; line-height: 1.8; color: #1a2540;
  display: none;
}
.theory-body.open { display: block; }
.theory-body p { margin-bottom: 10px; }
.theory-body p:last-child { margin-bottom: 0; }
.theory-body b { font-weight: 600; color: var(--ink); }
.theory-body .example-box {
  background: #fff; border: 1px solid #c8d8f8;
  border-radius: 7px; padding: 10px 14px;
  margin: 10px 0; font-family: var(--mono); font-size: 13px;
  line-height: 1.9; color: #1a2540;
}
.theory-body .step { margin-bottom: 4px; }
.theory-body .step::before { content: '→ '; color: var(--accent); font-weight: 600; }
.theory-body .rule-box {
  background: #e8f0fe; border-left: 3px solid var(--accent);
  border-radius: 0 7px 7px 0; padding: 8px 14px;
  margin: 10px 0; font-size: 13px; font-weight: 500;
}

@media (max-width: 540px) {
  main { padding: 1.25rem 1rem 4rem; }
  .task-input { width: 120px; }
  .section-title { font-size: 17px; }
  .topbar { padding: 0 1rem; }
  .nav-inner { padding: 0 0.75rem; }
  .theory-block { padding: 1rem; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="site-name">ALGEBRA_7</div>
      <div class="site-sub">Макарычев · Тренажёр</div>
    </div>
    <div class="top-score">
      <span id="global-score">0</span> / <span id="global-total">0</span> верно
    </div>
  </div>
</header>
<div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>

<nav class="nav-wrap">
  <div class="nav-inner" id="nav-inner"></div>
</nav>

<main id="main-area"></main>

<script>
// ═══════════════════════════════════════════════════════════════
// ДАННЫЕ: 12 тем, каждая содержит задачи двух типов — int и rat
// ═══════════════════════════════════════════════════════════════
const TOPICS = [

// ─────────────────────────────────────────────────
// 1. Приведение подобных членов
// ─────────────────────────────────────────────────
{ id:1, title:"Приведение подобных членов", short:"Подобные члены",
  desc:"Найди и приведи подобные слагаемые, упростив выражение.",
  theory:`
<p>Представь, что ты пришёл домой и у тебя в левом кармане <b>3 яблока</b>, а в правом — <b>5 яблок</b>. Ты же не говоришь маме «у меня 3 яблока и ещё 5 яблок» — ты сразу скажешь «у меня <b>8 яблок</b>». Вот это и есть приведение подобных членов: собрать одинаковое вместе и посчитать.</p>
<p>В алгебре буква — это как название фрукта. <b>3x</b> — это «3 икса», а <b>5x</b> — это «5 иксов». Их можно сложить: получится <b>8x</b> (восемь иксов). А вот <b>3x</b> и <b>5y</b> — это как яблоки и груши. Складывать нельзя, они разные.</p>
<p>Точно так же <b>3x</b> и <b>5x²</b> — разные, потому что степени разные (x и x² — это разные «фрукты»). Подобными могут быть только те члены, у которых <b>одинаковая буква в одинаковой степени</b>.</p>
<div class="rule-box">Главное правило: при приведении подобных ты складываешь или вычитаешь только числа (коэффициенты) перед буквой. Буквенную часть оставляешь без изменений.</div>
<p><b>Пример 1 — простой:</b></p>
<div class="example-box">
  <div>Упрости: 5x + 3x − 2x</div>
  <div class="step">Все три члена «иксовые» — подобные.</div>
  <div class="step">Складываем числа: 5 + 3 − 2 = 6</div>
  <div class="step">Буква остаётся: x</div>
  <div class="step">Ответ: <b>6x</b></div>
</div>
<p><b>Пример 2 — с разными группами:</b></p>
<div class="example-box">
  <div>Упрости: 3x² + 2x − x² + 5x</div>
  <div class="step">Группа 1 (иксы в квадрате): 3x² и −x² → 3 − 1 = 2 → <b>2x²</b></div>
  <div class="step">Группа 2 (просто иксы): 2x и 5x → 2 + 5 = 7 → <b>7x</b></div>
  <div class="step">Ответ: <b>2x² + 7x</b>. Эти две группы складывать между собой уже нельзя — разные «фрукты».</div>
</div>
<p><b>Пример 3 — с дробными коэффициентами:</b></p>
<div class="example-box">
  <div>Упрости: (1/2)x + (3/4)x − (1/4)x</div>
  <div class="step">Все члены с x — подобные. Работаем с дробями.</div>
  <div class="step">Приводим к общему знаменателю 4: 2/4 + 3/4 − 1/4 = 4/4 = 1</div>
  <div class="step">Ответ: <b>x</b> (то есть 1·x)</div>
</div>
<p><b>Частая ошибка:</b> если видишь 4a² − a², некоторые забывают, что перед одиноким a² стоит коэффициент <b>1</b> (просто он не пишется). 4a² − 1·a² = 3a², а не 4a².</p>
`,
  tasks:[
    // ЦЕЛЫЕ
    {type:"int", q:"Упрости: <code>5x + 3x − 2x</code>", a:"6x",
     ex:"Все три члена подобные (общая буква x). Складываем коэффициенты: 5 + 3 − 2 = <b>6</b>. Ответ: <b>6x</b>."},
    {type:"int", q:"Упрости: <code>7a² − 3a² + a²</code>", a:"5a²",
     ex:"Коэффициенты: 7 − 3 + 1 = <b>5</b>. Ответ: <b>5a²</b>."},
    {type:"int", q:"Упрости: <code>4xy − xy + 6xy − 2xy</code>", a:"8xy",
     ex:"4 − 1 + 6 − 2 = <b>8</b>. Ответ: <b>8xy</b>."},
    {type:"int", q:"Упрости: <code>3x² + 2x − x² + 5x</code> — коэффициент при x²", a:"2",
     ex:"Члены с x²: 3x² − x² = <b>2x²</b>. Коэффициент при x² равен <b>2</b>."},
    {type:"int", q:"Упрости: <code>9a − 4b + 2a − b</code> — коэффициент при a", a:"11",
     ex:"Члены с a: 9a + 2a = <b>11a</b>. Коэффициент: <b>11</b>."},
    {type:"int", q:"Упрости: <code>6x³ − 2x³ + x³ − 3x³</code>", a:"2x3",
     ex:"6 − 2 + 1 − 3 = <b>2</b>. Ответ: <b>2x³</b>."},
    {type:"int", q:"Упрости: <code>5m − 3n + 2m + 7n − m</code> — коэффициент при n", a:"4",
     ex:"Члены с n: −3n + 7n = <b>4n</b>. Коэффициент: <b>4</b>."},
    {type:"int", q:"Упрости: <code>4ab + 3a − 2ab − a</code> — коэффициент при ab", a:"2",
     ex:"Члены с ab: 4ab − 2ab = <b>2ab</b>. Коэффициент: <b>2</b>."},
    // РАЦИОНАЛЬНЫЕ
    {type:"rat", q:"Упрости: <code>(1/2)x + (3/4)x − (1/4)x</code>", a:"x",
     ex:"Общий знаменатель 4: 2/4 + 3/4 − 1/4 = 4/4 = <b>1</b>. Ответ: <b>x</b>."},
    {type:"rat", q:"Упрости: <code>0.3a + 1.7a − 0.5a</code>", a:"1.5a",
     ex:"0.3 + 1.7 − 0.5 = <b>1.5</b>. Ответ: <b>1.5a</b>."},
    {type:"rat", q:"Упрости: <code>(2/3)x² − (1/6)x² + (1/2)x²</code>", a:"x²",
     ex:"Общий знаменатель 6: 4/6 − 1/6 + 3/6 = 6/6 = <b>1</b>. Ответ: <b>x²</b>."},
    {type:"rat", q:"Упрости: <code>−0.6m + 2.4m − 0.8m</code>", a:"m",
     ex:"−0.6 + 2.4 − 0.8 = <b>1.0</b>. Ответ: <b>m</b>."},
    {type:"rat", q:"Упрости: <code>(3/5)ab − (1/10)ab + (1/2)ab</code> — коэффициент при ab", a:"1",
     ex:"Знаменатель 10: 6/10 − 1/10 + 5/10 = 10/10 = <b>1</b>."},
    {type:"rat", q:"Упрости: <code>1.2x + 0.3y − 0.7x + 1.2y</code> — коэффициент при y", a:"1.5",
     ex:"Члены с y: 0.3y + 1.2y = <b>1.5y</b>. Коэффициент: <b>1.5</b>."},
    {type:"rat", q:"Упрости: <code>(5/4)a − (3/8)a − (1/8)a</code>", a:"3/4a",
     ex:"Знаменатель 8: 10/8 − 3/8 − 1/8 = 6/8 = <b>3/4</b>. Ответ: <b>(3/4)a</b>."},
    {type:"rat", q:"Упрости: <code>−0.5x² + 1.5x² − 0.25x²</code>", a:"0.75x2",
     ex:"−0.5 + 1.5 − 0.25 = <b>0.75</b>. Ответ: <b>0.75x²</b>."},
  ]
},

// ─────────────────────────────────────────────────
// 2. Сложение и вычитание многочленов
// ─────────────────────────────────────────────────
{ id:2, title:"Сложение и вычитание многочленов", short:"Слож. и вычит.",
  desc:"Раскрой скобки и приведи подобные члены.",
  theory:`
<p>Многочлен — это просто несколько слагаемых, записанных вместе. Например, <b>3x² + 2x − 5</b> — это многочлен с тремя членами. Когда нужно сложить или вычесть два таких многочлена, всё сводится к одному действию: <b>аккуратно раскрыть скобки, а потом привести подобные</b>.</p>
<p>При сложении скобки снимаются легко — знаки не меняются. А вот при вычитании есть коварный момент: <b>минус перед скобкой переворачивает знак каждого члена внутри</b>. Не одного — каждого! Это самая частая ошибка в этой теме.</p>
<div class="rule-box">
  (A) + (B): просто убираем скобки, знаки не меняем.<br>
  (A) − (B): убираем скобки, но меняем знак КАЖДОГО члена в B на противоположный.<br>
  Потом приводим подобные члены как умеем.
</div>
<p><b>Пример 1 — сложение (всё просто):</b></p>
<div class="example-box">
  <div>(3x + 5) + (4x − 2)</div>
  <div class="step">Убираем скобки: 3x + 5 + 4x − 2</div>
  <div class="step">Группируем: (3x + 4x) + (5 − 2)</div>
  <div class="step">Считаем: <b>7x + 3</b></div>
</div>
<p><b>Пример 2 — вычитание (внимание на знаки!):</b></p>
<div class="example-box">
  <div>(5a − 2) − (3a + 1)</div>
  <div class="step">Минус перед скобкой меняет знаки: −(3a + 1) = −3a − 1</div>
  <div class="step">Получаем: 5a − 2 − 3a − 1</div>
  <div class="step">Группируем: (5a − 3a) + (−2 − 1) = <b>2a − 3</b></div>
</div>
<p><b>Пример 3 — вычитание с отрицательным членом:</b></p>
<div class="example-box">
  <div>(6x − 1) − (2x − 5)</div>
  <div class="step">Минус меняет знаки обоих членов: −(2x − 5) = −2x + 5</div>
  <div class="step">Записываем: 6x − 1 − 2x + 5</div>
  <div class="step">Считаем: (6x − 2x) + (−1 + 5) = <b>4x + 4</b></div>
  <div class="step">Заметь: минус на минус дал плюс! −(−5) = +5</div>
</div>

{ id:7, title:"Деление многочленов на одночлен", short:"Деление",

<p>Представь, что тебе нужно разделить <b>12 яблок и 8 груш поровну между 4 людьми</b>. Ты не думаешь «сначала сложу все фрукты вместе». Ты делишь отдельно: 12 ÷ 4 = 3 яблока каждому, 8 ÷ 4 = 2 груши каждому. Вот так и делится многочлен на одночлен: <b>каждый член делится на одночлен отдельно</b>.</p>
<p>Нужно помнить два правила: как делить числа (коэффициенты) и как делить степени.</p>
<div class="rule-box">

  Коэффициенты делятся как обычные числа.<br>
  Степени: xᵐ ÷ xⁿ = x^(m−n) — показатели вычитаются.<br>
  Если показатели равны: x² ÷ x² = x⁰ = 1 (просто единица, не ноль!).
</div>

<div class="example-box">

  <div class="step">Делим второй член: 9x ÷ 3x = (9÷3)·(x÷x) = 3·1 = 3</div>

<p>Перенос — это просто удобное сокращение. По сути ты вычитаешь (или прибавляешь) одно и то же из обеих частей. Но есть короткое правило: <b>при переносе через «=» знак меняется на противоположный</b>.</p>
<div class="rule-box">
  +5x справа → −5x слева (перенесли, знак сменился)<br>
  −3 слева → +3 справа (перенесли, знак сменился)<br>
  Алгоритм: 1) раскрой скобки, 2) перенеси все x влево, все числа вправо, 3) приведи подобные, 4) раздели на коэффициент, 5) проверь.
</div>
<p><b>Пример 1 — x с обеих сторон:</b></p>
<div class="example-box">
  <div>5x + 3 = 2x + 12</div>
  <div class="step">Переносим 2x влево (меняем знак): 5x − 2x = 12 − 3</div>
  <div class="step">Приводим подобные: 3x = 9</div>
  <div class="step">Делим на 3: x = 3</div>

`,

<div class="rule-box">
  Если при одной переменной коэффициенты уже противоположны → складываем уравнения, она исчезает.<br>
  Если нет → умножаем одно из уравнений на подходящее число, чтобы сделать их противоположными.<br>
  После нахождения одной переменной — подставляем в любое уравнение и находим вторую.
</div>
<p><b>Пример 1 — всё готово, просто складываем:</b></p>
<div class="example-box">
  <div>x + y = 8 и x − y = 2</div>
  <div class="step">При y: +1 и −1 — противоположны. Складываем:</div>
  <div class="step">(x+y) + (x−y) = 8 + 2 → 2x = 10 → x = 5</div>
  <div class="step">Подставляем в первое: 5 + y = 8 → y = 3</div>
  <div class="step">Проверка: 5 − 3 = 2 ✓</div>
</div>
<p><b>Пример 2 — нужно умножить уравнение:</b></p>
<div class="example-box">
  <div>2x + 3y = 12 и 4x − 3y = 6</div>
  <div class="step">При y: +3 и −3 — противоположны! Складываем:</div>
  <div class="step">6x = 18 → x = 3</div>
  <div class="step">Из первого: 2·3 + 3y = 12 → 3y = 6 → y = 2</div>
  <div class="step">Проверка: 4·3 − 3·2 = 12 − 6 = 6 ✓</div>
</div>
<p><b>Пример 3 — с дробными коэффициентами:</b></p>
<div class="example-box">
  <div>(1/2)x + y = 3 и (1/2)x − y = 1</div>
  <div class="step">При y: +1 и −1 — противоположны. Складываем:</div>
  <div class="step">x = 4</div>
  <div class="step">Из первого: (1/2)·4 + y = 3 → 2 + y = 3 → y = 1</div>
  <div class="step">Проверка: (1/2)·4 − 1 = 2 − 1 = 1 ✓</div>
</div>
<p><b>Когда какой метод лучше?</b> Метод сложения удобен, когда коэффициенты при одной переменной уже противоположны или легко сделать их такими. Метод подстановки — когда одна переменная уже выражена или её легко выразить. Оба метода дают одинаковый ответ — выбирай тот, что проще в конкретной задаче.</p>
`,
  tasks:[
    {type:"int", q:"<code>x+y=8; x−y=2</code>. Сложи и найди x.", a:"5",
     ex:"2x=10 → x=<b>5</b>."},
    {type:"int", q:"<code>2x+y=7; −2x+3y=1</code>. Сложи и найди y.", a:"2",
     ex:"4y=8 → y=<b>2</b>."},
    {type:"int", q:"<code>3x+2y=12; 3x−2y=6</code>. Вычти второе из первого и найди y.", a:"1.5",
     ex:"4y=6 → y=<b>1.5</b>."},
    {type:"int", q:"<code>x+2y=10; 3x−2y=6</code>. Сложи и найди x.", a:"4",
     ex:"4x=16 → x=<b>4</b>."},
    {type:"int", q:"<code>5x+3y=19; 5x−3y=1</code>. Сложи и найди x.", a:"2",
     ex:"10x=20 → x=<b>2</b>."},
    {type:"int", q:"<code>4x+y=11; −4x+3y=1</code>. Сложи и найди y.", a:"3",
     ex:"4y=12 → y=<b>3</b>."},
    {type:"int", q:"<code>2x+3y=13; 4x+3y=17</code>. Вычти первое из второго и найди x.", a:"2",
     ex:"2x=4 → x=<b>2</b>."},
    {type:"int", q:"<code>x+y=6; 2x−y=3</code>. Сложи и найди x.", a:"3",
     ex:"3x=9 → x=<b>3</b>."},
    // РАЦИОНАЛЬНЫЕ
    {type:"rat", q:"<code>(1/2)x+y=3; (1/2)x−y=1</code>. Сложи и найди x.", a:"4",
     ex:"x=4. Ответ: <b>4</b>."},
    {type:"rat", q:"<code>0.5x+0.5y=2; 0.5x−0.5y=1</code>. Сложи и найди x.", a:"3",
     ex:"x=3. Ответ: <b>3</b>."},
    {type:"rat", q:"<code>(2/3)x+y=4; (1/3)x−y=−1</code>. Сложи и найди x.", a:"3",
     ex:"x=3. Ответ: <b>3</b>."},
    {type:"rat", q:"<code>1.2x+y=5; −1.2x+2y=1</code>. Сложи и найди y.", a:"2",
     ex:"3y=6 → y=<b>2</b>."},
    {type:"rat", q:"<code>(3/4)x+(1/2)y=3; (1/4)x−(1/2)y=1</code>. Сложи и найди x.", a:"4",
     ex:"x=4. Ответ: <b>4</b>."},
    {type:"rat", q:"<code>0.3x+0.7y=2; 0.7x+0.3y=3</code>. Сложи уравнения и найди x+y.", a:"5",
     ex:"1.0x+1.0y=5 → x+y=<b>5</b>."},
    {type:"rat", q:"<code>(5/6)x+y=4; (1/6)x−y=−2</code>. Сложи и найди x.", a:"3",
     ex:"x=3... 5/6·3=5/2; 1/6·3=1/2. Сумма x: (5/6+1/6)x=2 → x=<b>3</b>. Проверь подстановкой."},
    {type:"rat", q:"<code>2.5x−1.5y=4; −2.5x+0.5y=−2</code>. Сложи и найди y.", a:"-1",
     ex:"−y=2 → y=<b>−1</b>."},
  ]
},

]; // END TOPICS

// ═══════════════════════════════════════
// СОСТОЯНИЕ
// ═══════════════════════════════════════
const KEY = 'algebra7_v1';
function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {}
}

let state = loadState(); // { topicId: { taskIdx: {tries, done} } }
let currentTopic = TOPICS[0].id;
let currentMode = 'both'; // 'both' | 'int' | 'rat'

function getTopicState(tid) {
  if (!state[tid]) state[tid] = {};
  return state[tid];
}
function globalStats() {
  let correct = 0, total = 0;
  TOPICS.forEach(topic => {
    topic.tasks.forEach((_, i) => {
      const ts = getTopicState(topic.id);
      total++;
      if (ts[i] && ts[i].done) correct++;
    });
  });
  return { correct, total };
}
function topicCorrect(tid) {
  const topic = TOPICS.find(t => t.id === tid);
  let c = 0;
  topic.tasks.forEach((_, i) => {
    const ts = getTopicState(tid);
    if (ts[i] && ts[i].done) c++;
  });
  return c;
}

// ═══════════════════════════════════════
// NORMALISE ANSWERS
// ═══════════════════════════════════════
function norm(s) {
  return String(s).trim().toLowerCase()
    .replace(/\s+/g, '').replace(/,/g, '.').replace(/\s*\+\s*/g, '+').replace(/\s*−\s*/g, '-').replace(/\s*-\s*/g, '-');
}
function isCorrect(user, correct) {
  const u = norm(user), c = norm(correct);
  if (u === c) return true;
  const uf = parseFloat(u), cf = parseFloat(c);
  if (!isNaN(uf) && !isNaN(cf) && Math.abs(uf - cf) < 0.001) return true;
  // fraction check: 1/9 vs 0.111
  if (u.includes('/') && !isNaN(cf)) {
    const parts = u.split('/');
    if (parts.length === 2) {
      const frac = parseFloat(parts[0]) / parseFloat(parts[1]);
      if (Math.abs(frac - cf) < 0.001) return true;
    }
  }
  if (c.includes('/') && !isNaN(uf)) {
    const parts = c.split('/');
    if (parts.length === 2) {
      const frac = parseFloat(parts[0]) / parseFloat(parts[1]);
      if (Math.abs(frac - uf) < 0.001) return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('nav-inner');
  nav.innerHTML = '';
  TOPICS.forEach(topic => {
    const c = topicCorrect(topic.id);
    const total = topic.tasks.length;
    const btn = document.createElement('button');
    btn.className = 'nav-btn' +
      (topic.id === currentTopic ? ' active' : '') +
      (c === total ? ' done-nav' : '');
    btn.textContent = topic.short;
    btn.title = topic.title;
    btn.onclick = () => { currentTopic = topic.id; render(); };
    nav.appendChild(btn);
  });
}

function buildMain() {
  const topic = TOPICS.find(t => t.id === currentTopic);
  const ts = getTopicState(currentTopic);
  const main = document.getElementById('main-area');

  let tasks = topic.tasks;
  if (currentMode === 'int') tasks = topic.tasks.filter(t => t.type === 'int');
  if (currentMode === 'rat') tasks = topic.tasks.filter(t => t.type === 'rat');

  const correctCount = tasks.filter((_, li) => {
    const realIdx = topic.tasks.indexOf(tasks[li]);
    return ts[realIdx] && ts[realIdx].done;
  }).length;

  main.innerHTML = `
    <div class="section-head">
      <div class="section-num">Тема ${currentTopic} из ${TOPICS.length}</div>
      <div class="section-title">${topic.title}</div>
      <div class="section-desc">${topic.desc}</div>
    </div>
    ${topic.theory ? `
    <div class="theory-block">
      <div class="theory-toggle" onclick="toggleTheory(this)">
        <span class="theory-label">Объяснение темы — прочитай перед заданиями</span>
        <span class="theory-chevron open">▲</span>
      </div>
      <div class="theory-body open">${topic.theory}</div>
    </div>` : ''}
    <div class="mode-toggle">
      <button class="mode-btn ${currentMode==='both'?'active':''}" onclick="setMode('both')">Все</button>
      <button class="mode-btn ${currentMode==='int'?'active':''}" onclick="setMode('int')">Целые числа</button>
      <button class="mode-btn ${currentMode==='rat'?'active':''}" onclick="setMode('rat')">Рациональные</button>
    </div>
    <div class="tasks-grid" id="tasks-grid"></div>
    <div class="section-footer">
      <div class="score-line">Выполнено: <b>${correctCount}</b> из <b>${tasks.length}</b></div>
      <button class="btn-next" ${currentTopic < TOPICS.length ? '' : 'style="display:none"'}
        onclick="nextTopic()">Следующая тема →</button>
    </div>`;

  const grid = document.getElementById('tasks-grid');
  let lastType = null;

  tasks.forEach((task, li) => {
    const realIdx = topic.tasks.indexOf(task);
    const tdata = ts[realIdx] || {};

    if (currentMode === 'both' && task.type !== lastType) {
      const lbl = document.createElement('div');
      lbl.className = 'group-label';
      lbl.textContent = task.type === 'int' ? 'Целые числа' : 'Рациональные числа';
      grid.appendChild(lbl);
      lastType = task.type;
    }

    const card = document.createElement('div');
    card.className = 'task-card' + (tdata.done ? ' correct' : '');
    card.id = `card-${realIdx}`;

    const typeLbl = task.type === 'int'
      ? '<span class="task-type type-int">Целые</span>'
      : '<span class="task-type type-rat">Рациональные</span>';

    card.innerHTML = `
      <div class="task-top">
        <span class="task-num">${li + 1}</span>
        <div class="task-q">${task.q}</div>
        ${typeLbl}
      </div>
      <div class="task-row">
        <input class="task-input ${tdata.done ? 'ok' : ''}"
          id="inp-${realIdx}"
          value="${tdata.done ? task.a : ''}"
          placeholder="Ответ"
          ${tdata.done ? 'disabled' : ''}
          autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-check" id="chk-${realIdx}"
          ${tdata.done ? 'disabled' : ''}
          onclick="check(${realIdx})">Проверить</button>
        <span class="attempts-badge" id="att-${realIdx}"
          ${tdata.tries ? 'style="display:inline-block"' : ''}>
          ${tdata.tries ? 'попыток: ' + tdata.tries : ''}
        </span>
      </div>
      <div class="task-fb ${tdata.done ? 'ok' : ''}" id="fb-${realIdx}"
        ${tdata.done ? 'style="display:block"' : ''}>
        ${tdata.done ? '✓ Верно!' : ''}
      </div>
      <div class="task-explain" id="exp-${realIdx}"></div>`;

    grid.appendChild(card);

    if (!tdata.done) {
      const inp = document.getElementById(`inp-${realIdx}`);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') check(realIdx); });
    }
  });
}


function toggleTheory(el) {
  const body = el.parentElement.querySelector('.theory-body');
  const chevron = el.querySelector('.theory-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

function render() {
  buildNav();
  buildMain();
  updateGlobal();
}

function updateGlobal() {
  const { correct, total } = globalStats();
  document.getElementById('global-score').textContent = correct;
  document.getElementById('global-total').textContent = total;
  document.getElementById('pbar').style.width = Math.round(correct / total * 100) + '%';
}

function setMode(m) {
  currentMode = m;
  render();
}

function nextTopic() {
  if (currentTopic < TOPICS.length) {
    currentTopic++;
    render();
    window.scrollTo(0, 0);
  }
}

function check(realIdx) {
  const topic = TOPICS.find(t => t.id === currentTopic);
  const task = topic.tasks[realIdx];
  const ts = getTopicState(currentTopic);
  if (!ts[realIdx]) ts[realIdx] = { tries: 0, done: false };

  const inp = document.getElementById(`inp-${realIdx}`);
  const fb = document.getElementById(`fb-${realIdx}`);
  const exp = document.getElementById(`exp-${realIdx}`);
  const att = document.getElementById(`att-${realIdx}`);
  const card = document.getElementById(`card-${realIdx}`);
  const chk = document.getElementById(`chk-${realIdx}`);

  ts[realIdx].tries++;
  att.style.display = 'inline-block';
  att.textContent = 'попыток: ' + ts[realIdx].tries;

  if (isCorrect(inp.value, task.a)) {
    ts[realIdx].done = true;
    inp.className = 'task-input ok'; inp.disabled = true;
    chk.disabled = true;
    fb.className = 'task-fb ok'; fb.textContent = '✓ Верно!';
    card.className = 'task-card correct';
    exp.classList.remove('show');
    saveState(state);
    updateGlobal();
    buildNav();
  } else {
    inp.className = 'task-input err';
    fb.className = 'task-fb err'; fb.textContent = '✗ Неверно';
    exp.innerHTML = task.ex;
    exp.classList.add('show');
    card.className = 'task-card wrong';
    saveState(state);
    inp.focus(); inp.select();
    setTimeout(() => { inp.className = 'task-input'; card.className = 'task-card'; }, 1500);
  }
}

render();
</script>
</body>
